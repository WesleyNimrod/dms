<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <script>
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            if (e.matches) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        });
    </script>
    <style>
        :root {
            --primary: #b91c1c;
        }
        .theme-islamic {
            --primary: #0d7377;
        }

        /* Sticky proposition bar */
        .sticky-bar {
            position: sticky;
            top: 0;
            z-index: 50;
        }

        /* Range slider */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #d1d5db;
            outline: none;
            margin: 8px 0;
        }
        .dark input[type="range"] {
            background: #4b5563;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            border: none;
        }

        /* Editable rate/fee fields */
        .editable-field {
            display: inline-block;
            border: 1px dashed #9ca3af;
            padding: 5px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            text-align: center;
            cursor: text;
            min-width: 64px;
            transition: border-color 0.2s;
        }
        .dark .editable-field {
            border-color: #6b7280;
            color: #e5e7eb;
        }
        .editable-field:hover {
            border-color: var(--primary);
        }
        .editable-field:focus {
            outline: none;
            border-color: var(--primary);
            border-style: solid;
        }

        /* Product toggle */
        .prod-toggle {
            display: inline-flex;
            background: #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #d1d5db;
        }
        .dark .prod-toggle {
            background: #374151;
            border-color: #4b5563;
        }
        .prod-toggle button {
            padding: 6px 22px;
            font-size: 13px;
            font-weight: 600;
            color: #6b7280;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .dark .prod-toggle button {
            color: #9ca3af;
        }
        .prod-toggle button.active {
            background: var(--primary);
            color: white;
        }

        /* Tenure buttons */
        .t-btn {
            padding: 6px 14px;
            border: 2px solid #d1d5db;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #6b7280;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        .dark .t-btn {
            background: #374151;
            border-color: #4b5563;
            color: #9ca3af;
        }
        .t-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Proposition tab buttons */
        .prop-tab {
            flex: 1;
            padding: 10px 0;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: #6b7280;
            border-bottom: 3px solid transparent;
        }
        .dark .prop-tab {
            color: #9ca3af;
        }
        .prop-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
    </style>
</head>
<body class="min-h-screen bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200" id="app">

<div class="max-w-lg mx-auto">

    <!-- Sticky Proposition Tabs -->
    <div class="sticky-bar bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700">
        <div class="flex px-4">
            <button class="prop-tab active" id="propConv" onclick="setProposition('conventional')">Conventional</button>
            <button class="prop-tab" id="propIslam" onclick="setProposition('islamic')">Islamic</button>
        </div>
    </div>

    <div class="px-4 py-4">
        <!-- Cards Container -->
        <div id="cardsContainer" class="space-y-4 mb-4"></div>

        <!-- Total Summary -->
        <div id="totalSummary" class="bg-white dark:bg-gray-800 rounded-lg p-4 mb-4 shadow-sm" style="display:none; border: 2px solid var(--primary);">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-sm font-bold" style="color: var(--primary)">Total Summary</h3>
                <button onclick="copyAll()" class="text-xs px-3 py-1 rounded font-semibold border-2" style="border-color:var(--primary);color:var(--primary)">Copy All</button>
            </div>
            <div id="copySumMsg" class="text-xs text-green-600 font-semibold mb-2" style="display:none">Copied to clipboard</div>
            <div class="grid grid-cols-3 gap-2 text-center">
                <div class="p-2 bg-gray-50 dark:bg-gray-700 rounded-lg">
                    <div class="text-xs text-gray-500 dark:text-gray-400 mb-1">Total Loan</div>
                    <div class="font-bold text-sm" style="color: var(--primary)" id="sumLoan">0</div>
                </div>
                <div class="p-2 bg-gray-50 dark:bg-gray-700 rounded-lg">
                    <div class="text-xs text-gray-500 dark:text-gray-400 mb-1">Total Fees</div>
                    <div class="font-bold text-sm text-red-600" id="sumFees">0</div>
                </div>
                <div class="p-2 bg-gray-50 dark:bg-gray-700 rounded-lg">
                    <div class="text-xs text-gray-500 dark:text-gray-400 mb-1">Monthly Installment</div>
                    <div class="font-bold text-sm text-green-600" id="sumMonthly">0</div>
                </div>
            </div>
        </div>

        <!-- Add Card Button -->
        <div id="addCardBtn" class="text-center mb-4">
            <button onclick="addCard()" class="text-white px-5 py-2 rounded-lg font-semibold text-sm shadow-sm" style="background: var(--primary)">
                + Add Second Card
            </button>
        </div>
    </div>
</div>

<script>
    // --- Data ---
    var convFees = { 3: 2.10, 6: 3.15, 9: 4.20, 12: 5.25 };
    var islamFees = {
        bt: { 9: 2.10, 12: 2.10 },
        ccl: { 9: 2.63, 12: 2.63 }
    };
    var proposition = 'conventional';
    var cardCount = 0;

    // --- Proposition ---
    function setProposition(type) {
        proposition = type;
        var appEl = document.getElementById('app');
        if (type === 'islamic') {
            appEl.classList.add('theme-islamic');
        } else {
            appEl.classList.remove('theme-islamic');
        }
        document.getElementById('propConv').classList.toggle('active', type === 'conventional');
        document.getElementById('propIslam').classList.toggle('active', type === 'islamic');

        for (var i = 1; i <= cardCount; i++) {
            if (document.getElementById('card-' + i)) {
                rebuildTenure(i);
                syncFee(i);
                calc(i);
            }
        }
    }

    // --- Card Management ---
    function addCard() {
        if (cardCount >= 2) return;
        cardCount++;
        var id = cardCount;
        var el = document.createElement('div');
        el.id = 'card-' + id;
        el.className = 'bg-white dark:bg-gray-800 rounded-lg p-4 shadow-sm';
        el.innerHTML = cardHTML(id);
        document.getElementById('cardsContainer').appendChild(el);

        rebuildTenure(id);
        setTimeout(function() {
            var btn12 = document.querySelector('#tenure-' + id + ' .t-btn[data-v="12"]');
            if (btn12) btn12.click();
        }, 10);

        updateTitles();
        if (cardCount >= 2) {
            document.getElementById('addCardBtn').style.display = 'none';
        }
    }

    function cardHTML(id) {
        var removeBtn = id > 1
            ? '<button onclick="removeCard(' + id + ')" class="text-red-500 hover:text-red-700 font-bold text-xl leading-none">&times;</button>'
            : '';

        return ''
            + '<div class="flex justify-between items-center mb-1">'
            +   '<span class="card-title text-sm font-bold" style="color:var(--primary)">Credit Card</span>'
            +   '<div class="flex items-center gap-2">'
            +     '<button onclick="copyCard(' + id + ')" class="text-xs px-3 py-1 rounded font-semibold border-2" style="border-color:var(--primary);color:var(--primary)">Copy</button>'
            +     removeBtn
            +   '</div>'
            + '</div>'
            + '<div id="copyMsg-' + id + '" class="text-xs text-green-600 font-semibold mb-2" style="display:none">Copied to clipboard</div>'

            // Credit Limit
            + '<div class="mb-3">'
            +   '<label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1">Credit Limit (optional)</label>'
            +   '<input type="text" id="limit-' + id + '" placeholder="Enter credit limit" style="font-size:16px"'
            +   ' class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm font-semibold bg-white dark:bg-gray-700 dark:text-gray-200"'
            +   ' oninput="fmtCommas(this);onLimitChange(' + id + ')">'
            + '</div>'

            // Loan Amount
            + '<div class="mb-3">'
            +   '<label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1">Loan Amount</label>'
            +   '<input type="text" id="amt-' + id + '" placeholder="Enter loan amount" style="font-size:16px"'
            +   ' class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm font-semibold bg-white dark:bg-gray-700 dark:text-gray-200 mb-1"'
            +   ' oninput="fmtCommas(this);fromInput(' + id + ')">'
            +   '<input type="range" id="slider-' + id + '" min="0" max="100000" step="500" value="0" oninput="fromSlider(' + id + ')">'
            +   '<div class="flex justify-between text-xs text-gray-400 dark:text-gray-500">'
            +     '<span>0</span>'
            +     '<span class="font-bold" style="color:var(--primary)" id="sVal-' + id + '">0</span>'
            +     '<span id="sliderMaxLabel-' + id + '">100,000</span>'
            +   '</div>'
            +   '<div id="warn-' + id + '" class="text-xs text-red-600 font-semibold mt-1" style="display:none">Warning: Amount is less than 3,500</div>'
            + '</div>'

            // Product Type
            + '<div class="mb-3 text-center">'
            +   '<label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2">Product Type</label>'
            +   '<div class="prod-toggle" id="prodToggle-' + id + '">'
            +     '<button class="active" data-type="ccl" onclick="setProd(' + id + ',\'ccl\')">CCL</button>'
            +     '<button data-type="bt" onclick="setProd(' + id + ',\'bt\')">BT</button>'
            +   '</div>'
            + '</div>'

            // Tenure
            + '<div class="mb-3 text-center">'
            +   '<label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2">Tenure</label>'
            +   '<div class="flex justify-center gap-2" id="tenure-' + id + '"></div>'
            + '</div>'

            // Rate & Fee
            + '<div class="grid grid-cols-2 gap-4 mb-3 text-center">'
            +   '<div>'
            +     '<label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1">Profit / Interest</label>'
            +     '<div class="editable-field" id="rate-' + id + '" contenteditable="true" onblur="vRate(' + id + ')" onkeypress="return kp(event)">0%</div>'
            +   '</div>'
            +   '<div>'
            +     '<label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1">Processing Fee</label>'
            +     '<div class="editable-field" id="fee-' + id + '" contenteditable="true" onblur="vFee(' + id + ')" onkeypress="return kp(event)">0%</div>'
            +   '</div>'
            + '</div>'

            // Results
            + '<div class="grid grid-cols-3 gap-2 text-center">'
            +   '<div class="p-2 bg-gray-50 dark:bg-gray-700 rounded-lg">'
            +     '<div class="text-xs text-gray-500 dark:text-gray-400 mb-1">Monthly Installment</div>'
            +     '<div class="font-bold text-sm" style="color:var(--primary)" id="resMonthly-' + id + '">0</div>'
            +   '</div>'
            +   '<div class="p-2 bg-gray-50 dark:bg-gray-700 rounded-lg">'
            +     '<div class="text-xs text-gray-500 dark:text-gray-400 mb-1">Fees</div>'
            +     '<div class="font-bold text-sm text-red-600" id="resFees-' + id + '">0</div>'
            +   '</div>'
            +   '<div class="p-2 bg-gray-50 dark:bg-gray-700 rounded-lg">'
            +     '<div class="text-xs text-gray-500 dark:text-gray-400 mb-1">Tenure</div>'
            +     '<div class="font-bold text-sm dark:text-gray-200" id="resTenure-' + id + '">-</div>'
            +   '</div>'
            + '</div>';
    }

    function updateTitles() {
        for (var i = 1; i <= cardCount; i++) {
            var el = document.getElementById('card-' + i);
            if (!el) continue;
            el.querySelector('.card-title').textContent = cardCount === 1 ? 'Credit Card' : 'Credit Card ' + i;
        }
    }

    function removeCard(id) {
        document.getElementById('card-' + id).remove();
        document.getElementById('addCardBtn').style.display = 'block';
        updateTitles();
        updateSummary();
    }

    // --- Formatting ---
    function fmtCommas(inp) {
        var v = inp.value.replace(/[^\d]/g, '');
        if (v.length > 3) {
            v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }
        inp.value = v;
    }

    function numVal(el) {
        return parseFloat(el.value.replace(/,/g, '')) || 0;
    }

    // --- Credit Limit Change ---
    function onLimitChange(id) {
        var lim = numVal(document.getElementById('limit-' + id));
        var slider = document.getElementById('slider-' + id);
        var maxLabel = document.getElementById('sliderMaxLabel-' + id);

        if (lim > 0) {
            var maxLoan = Math.floor((lim * 0.9) / 500) * 500;
            if (maxLoan < 0) maxLoan = 0;
            slider.max = maxLoan;
            maxLabel.textContent = maxLoan.toLocaleString();

            // Clamp current value
            var curVal = parseInt(slider.value, 10);
            if (curVal > maxLoan) {
                slider.value = maxLoan;
                document.getElementById('amt-' + id).value = maxLoan.toLocaleString();
                document.getElementById('sVal-' + id).textContent = maxLoan.toLocaleString();
                checkWarn(id, maxLoan);
            }
        } else {
            slider.max = 100000;
            maxLabel.textContent = '100,000';
        }
        calc(id);
    }

    // --- Loan Amount Sync ---
    function fromInput(id) {
        var v = numVal(document.getElementById('amt-' + id));
        var s = document.getElementById('slider-' + id);
        var maxVal = parseInt(s.max, 10);

        // Clamp to slider max if credit limit is set
        var lim = numVal(document.getElementById('limit-' + id));
        if (lim > 0 && v > maxVal) {
            v = maxVal;
            document.getElementById('amt-' + id).value = v.toLocaleString();
        }

        var rounded = Math.min(Math.round(v / 500) * 500, maxVal);
        s.value = rounded;
        document.getElementById('sVal-' + id).textContent = v.toLocaleString();
        checkWarn(id, v);
        calc(id);
    }

    function fromSlider(id) {
        var v = parseInt(document.getElementById('slider-' + id).value, 10);
        document.getElementById('amt-' + id).value = v.toLocaleString();
        document.getElementById('sVal-' + id).textContent = v.toLocaleString();
        checkWarn(id, v);
        calc(id);
    }

    function checkWarn(id, v) {
        var show = v > 0 && v < 3500;
        document.getElementById('warn-' + id).style.display = show ? 'block' : 'none';
        var input = document.getElementById('amt-' + id);
        var sVal = document.getElementById('sVal-' + id);
        if (show) {
            input.classList.add('border-red-500', 'text-red-600');
            input.classList.remove('border-gray-300');
            sVal.style.color = '#dc2626';
        } else {
            input.classList.remove('border-red-500', 'text-red-600');
            input.classList.add('border-gray-300');
            sVal.style.color = 'var(--primary)';
        }
    }

    // --- Product Type ---
    function setProd(id, type) {
        var btns = document.querySelectorAll('#prodToggle-' + id + ' button');
        btns.forEach(function(b) {
            b.classList.toggle('active', b.getAttribute('data-type') === type);
        });
        syncFee(id);
        calc(id);
    }

    function getProd(id) {
        var active = document.querySelector('#prodToggle-' + id + ' button.active');
        return active ? active.getAttribute('data-type') : 'ccl';
    }

    // --- Tenure ---
    function rebuildTenure(id) {
        var c = document.getElementById('tenure-' + id);
        var months = proposition === 'conventional' ? [3, 6, 9, 12] : [9, 12];
        var cur = c.querySelector('.t-btn.active');
        var curVal = cur ? parseInt(cur.getAttribute('data-v'), 10) : 12;
        if (months.indexOf(curVal) === -1) curVal = months[months.length - 1];

        c.innerHTML = '';
        months.forEach(function(m) {
            var b = document.createElement('button');
            b.className = 't-btn' + (m === curVal ? ' active' : '');
            b.setAttribute('data-v', m);
            b.textContent = m + 'm';
            b.onclick = function() {
                c.querySelectorAll('.t-btn').forEach(function(x) { x.classList.remove('active'); });
                b.classList.add('active');
                syncFee(id);
                calc(id);
            };
            c.appendChild(b);
        });
        syncFee(id);
    }

    function getTenure(id) {
        var a = document.querySelector('#tenure-' + id + ' .t-btn.active');
        return a ? parseInt(a.getAttribute('data-v'), 10) : 0;
    }

    // --- Processing Fee Auto-fill ---
    function syncFee(id) {
        var t = getTenure(id);
        var p = getProd(id);
        var f = 0;
        if (t) {
            if (proposition === 'conventional') {
                f = convFees[t] || 0;
            } else {
                f = (p === 'bt' ? islamFees.bt[t] : islamFees.ccl[t]) || 0;
            }
        }
        document.getElementById('fee-' + id).textContent = f + '%';
    }

    // --- Editable Fields ---
    function vRate(id) {
        var el = document.getElementById('rate-' + id);
        var v = parseFloat(el.textContent.replace('%', ''));
        if (isNaN(v) || v < 0) v = 0;
        el.textContent = v.toFixed(2) + '%';
        calc(id);
    }

    function vFee(id) {
        var el = document.getElementById('fee-' + id);
        var v = parseFloat(el.textContent.replace('%', ''));
        if (isNaN(v) || v < 0) v = 0;
        el.textContent = v.toFixed(2) + '%';
        calc(id);
    }

    function kp(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            e.target.blur();
            return false;
        }
        return true;
    }

    // --- Calculation ---
    function calc(id) {
        var loan = numVal(document.getElementById('amt-' + id));
        var tenure = getTenure(id);
        var feeRate = parseFloat(document.getElementById('fee-' + id).textContent) || 0;
        var rate = parseFloat(document.getElementById('rate-' + id).textContent) || 0;

        document.getElementById('resTenure-' + id).textContent = tenure ? tenure + ' months' : '-';

        if (!loan || !tenure) {
            document.getElementById('resMonthly-' + id).textContent = '0';
            document.getElementById('resFees-' + id).textContent = '0';
            updateSummary();
            return;
        }

        var monthly = (loan / tenure) + (loan * rate / 100);
        var fees = loan * feeRate / 100;

        document.getElementById('resMonthly-' + id).textContent = monthly.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        document.getElementById('resFees-' + id).textContent = fees.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        updateSummary();
    }

    // --- Summary ---
    function updateSummary() {
        var tLoan = 0;
        var tFees = 0;
        var tMonthly = 0;
        var hasCalc = false;

        for (var i = 1; i <= cardCount; i++) {
            if (!document.getElementById('card-' + i)) continue;
            tLoan += numVal(document.getElementById('amt-' + i));
            var mText = document.getElementById('resMonthly-' + i).textContent;
            if (mText !== '0') {
                hasCalc = true;
                tFees += parseFloat(document.getElementById('resFees-' + i).textContent.replace(/,/g, '')) || 0;
                tMonthly += parseFloat(mText.replace(/,/g, '')) || 0;
            }
        }

        document.getElementById('sumLoan').textContent = tLoan.toLocaleString();
        document.getElementById('sumFees').textContent = tFees.toLocaleString();
        document.getElementById('sumMonthly').textContent = tMonthly.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        document.getElementById('totalSummary').style.display = (cardCount > 1 && hasCalc) ? 'block' : 'none';
    }

    // --- Build copy text for a single card ---
    function buildCardCopyText(id, label) {
        var prod = getProd(id);
        var heading = prod === 'ccl' ? 'CREDIT CARD LOAN' : 'BALANCE TRANSFER';
        var loan = numVal(document.getElementById('amt-' + id));
        var tenure = getTenure(id);
        var rate = document.getElementById('rate-' + id).textContent;
        var monthly = document.getElementById('resMonthly-' + id).textContent;
        var feePct = document.getElementById('fee-' + id).textContent;
        var feeAmt = document.getElementById('resFees-' + id).textContent;

        var lines = '';
        if (label) {
            lines += label + '\n';
        }
        lines += heading
            + '\nAmount: AED ' + loan.toLocaleString()
            + '\nTenure: ' + tenure + ' months'
            + '\nProfit/Interest: ' + rate
            + '\nMonthly: AED ' + monthly
            + '\nProcessing Fees (' + feePct + '): AED ' + feeAmt;
        return lines;
    }

    // --- Copy single card ---
    function copyCard(id) {
        var txt = buildCardCopyText(id, '');
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(txt).then(function() {
                showCopyMsg(id);
            });
        }
    }

    // --- Copy All (both cards + summary) ---
    function copyAll() {
        var parts = [];
        for (var i = 1; i <= cardCount; i++) {
            if (!document.getElementById('card-' + i)) continue;
            var label = 'Card ' + i;
            parts.push(buildCardCopyText(i, label));
        }

        var tLoan = document.getElementById('sumLoan').textContent;
        var tFees = document.getElementById('sumFees').textContent;
        var tMonthly = document.getElementById('sumMonthly').textContent;

        parts.push('TOTAL SUMMARY'
            + '\nTotal Loan: AED ' + tLoan
            + '\nTotal Fees: AED ' + tFees
            + '\nMonthly Installment: AED ' + tMonthly);

        var txt = parts.join('\n\n');
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(txt).then(function() {
                var msg = document.getElementById('copySumMsg');
                msg.style.display = 'block';
                setTimeout(function() { msg.style.display = 'none'; }, 2000);
            });
        }
    }

    function showCopyMsg(id) {
        var msg = document.getElementById('copyMsg-' + id);
        msg.style.display = 'block';
        setTimeout(function() {
            msg.style.display = 'none';
        }, 2000);
    }

    // --- Init ---
    addCard();
</script>
